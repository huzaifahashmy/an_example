<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexusBlog{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f1a;
            --surface-color: #1a1a2e;
            --primary-color: #7c3aed;
            --primary-hover: #6d28d9;
            --accent-color: #a78bfa;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #2d2d4e;
            --glass-bg: rgba(26, 26, 46, 0.8);
            --glass-border: rgba(167, 139, 250, 0.15);
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(124, 58, 237, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, 0.05) 0%, transparent 50%);
        }

        /* Navbar */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .nav-username {
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #5b21b6);
            color: white;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover), #4c1d95);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(124, 58, 237, 0.45);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger-color);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            border: 1px solid var(--danger-color);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: var(--danger-color);
            color: white;
        }

        .btn-edit {
            background: transparent;
            color: var(--accent-color);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            border: 1px solid var(--accent-color);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-edit:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
        }

        /* Alerts */
        .alert {
            padding: 0.9rem 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        /* Form Styles */
        .form-container {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .form-container h2 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        .form-control-file {
            width: 100%;
            color: var(--text-muted);
            padding: 0.5rem 0;
        }

        /* Help text and errors */
        .helptext {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        ul.errorlist {
            list-style: none;
            color: #fca5a5;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* Card */
        .blog-card {
            background: var(--surface-color);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }

        .card-img-wrapper {
            height: 200px;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .blog-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .card-date {
            font-size: 0.82rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .card-author {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            line-height: 1.3;
        }

        .card-excerpt {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            flex: 1;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
            grid-column: 1 / -1;
        }

        .empty-state h3 {
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        /* Divider */
        .form-divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 1.5rem 0;
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-container">
            <a href="{% url 'index' %}" class="brand">NexusBlog</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                <a href="{% url 'create_post' %}" class="btn-primary">+ New Post</a>
                <span class="nav-username">👤 {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn-secondary">Logout</a>
                {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 NexusBlog. All rights reserved.</p>
    </footer>
</body>

</html>
